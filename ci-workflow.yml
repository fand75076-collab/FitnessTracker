name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests -v
        env:
          PYTHONPATH: ${{ github.workspace }}

  build-exe:
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Checkpoint database
        run: |
          python -c "import sqlite3; conn = sqlite3.connect('data/workout.db'); conn.execute('PRAGMA wal_checkpoint(FULL)'); conn.close()"
        shell: pwsh

      - name: Build EXE
        run: |
          python -m PyInstaller `
            --noconfirm --clean --windowed --name FitnessTracker `
            --add-data "app.py;." `
            --add-data "fitness_tracker/config;fitness_tracker/config" `
            --add-data "fitness_tracker/static;fitness_tracker/static" `
            --collect-all streamlit `
            --collect-all altair `
            --collect-all webview `
            --collect-all pythonnet `
            --collect-all clr_loader `
            --exclude-module pytest `
            --exclude-module pyarrow.tests `
            --exclude-module pandas.tests `
            --exclude-module numpy.tests `
            --collect-submodules fitness_tracker `
            launcher.py
        shell: pwsh

      - name: Copy database into dist
        run: |
          New-Item -ItemType Directory -Force -Path "dist/FitnessTracker/data" | Out-Null
          Copy-Item "data/workout.db" "dist/FitnessTracker/data/workout.db" -Force
        shell: pwsh

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitnessTracker-Windows
          path: dist/FitnessTracker/

  build-apk:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '8.10.2'

      - name: Copy database to Android assets
        run: |
          python sync_exercise_config.py
          mkdir -p android/FitnessTrackerAndroid/app/src/main/assets
          cp data/workout.db android/FitnessTrackerAndroid/app/src/main/assets/workout.db || true

      - name: Build debug APK
        run: |
          gradle -p android/FitnessTrackerAndroid :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitnessTracker-Android
          path: android/FitnessTrackerAndroid/app/build/outputs/apk/debug/app-debug.apk
